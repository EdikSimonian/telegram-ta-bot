name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    # Skip for routine-authored PRs — pr-review.yml already runs pytest
    # against their merge commit and decides merge based on that. Running
    # the same suite here would just double the CI time and confuse the
    # gating story.
    if: >-
      !(startsWith(github.head_ref, 'claude/upgrade-') ||
        contains(github.event.pull_request.body, 'Self-upgrade routine'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit dependencies
        run: pip install pip-audit && pip-audit -r requirements.txt
