name: AI PR Review

# Posts an OpenAI-generated review comment on PRs opened by the Claude
# Code self-upgrade routine. Skips hand-written PRs to avoid burning
# OpenAI credits on every push.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [test, main]

permissions:
  pull-requests: write
  contents:      write    # needed for auto-merge on ✅ verdict

jobs:
  review:
    # Same-repo only (fork PRs don't get secrets). Narrow to the
    # routine's output: branch under claude/upgrade- or the body
    # carries its signature.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.head_ref, 'claude/upgrade-') ||
       contains(github.event.pull_request.body, 'Self-upgrade routine'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      merged: ${{ steps.merge.outputs.merged }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenAI SDK
        run: pip install 'openai>=1.40,<2'

      - name: Fetch PR diff + metadata
        run: |
          PR="${{ github.event.pull_request.number }}"
          gh pr diff "$PR" > pr.diff
          gh pr view "$PR" --json title,body,headRefName,author \
            -q '{title, body, headRefName, author: .author.login}' > pr.json
          # Bail early if the diff is empty — nothing to review.
          if [ ! -s pr.diff ]; then
            echo "Empty diff, skipping review." >&2
            echo "skip=1" >> "$GITHUB_OUTPUT"
          fi
        id: fetch

      - name: Run OpenAI review
        if: steps.fetch.outputs.skip != '1'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:   ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-5.4' }}
        run: python .github/scripts/review_pr.py pr.diff pr.json CLAUDE.md > review.md

      - name: Post review comment
        if: steps.fetch.outputs.skip != '1'
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file review.md

      # Auto-merge only when the reviewer explicitly approves. The
      # reviewer's system prompt pins the verdict line format, so a
      # fixed-string grep is both strict and readable. ⚠️ and 🛑 leave
      # the PR open for human review. `--auto` queues the merge if the
      # base branch has protection rules; falls through to an immediate
      # merge if not. Emits `merged=true` on success so the downstream
      # deploy job can fire — merges via GITHUB_TOKEN do not trigger
      # push events, so deploy must be invoked explicitly.
      - name: Auto-merge if verdict is ✅ approve
        id: merge
        if: steps.fetch.outputs.skip != '1'
        run: |
          PR="${{ github.event.pull_request.number }}"
          if grep -Fq '**Verdict:** ✅ approve' review.md; then
            echo "Verdict approved — merging PR #$PR."
            if gh pr merge "$PR" --squash --delete-branch --auto \
               || gh pr merge "$PR" --squash --delete-branch; then
              echo "merged=true" >> "$GITHUB_OUTPUT"
            else
              echo "merged=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "Verdict was not ✅ approve — leaving PR open for manual review."
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

  # Reusable-workflow invocation. Runs only when the review job actually
  # merged the PR. Targets the PR's base branch (test or main), which
  # matches the branches deploy.yml's push trigger covers — so direct
  # pushes and auto-merges now share the same deploy path.
  deploy:
    needs: review
    if: needs.review.outputs.merged == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      ref: ${{ github.event.pull_request.base.ref }}
    secrets: inherit
