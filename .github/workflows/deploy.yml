name: Deploy

# Triggers:
# - push: normal deploy on direct push to main/test
# - workflow_call: invoked from pr-review.yml after an auto-merge. Needed
#   because merges performed with GITHUB_TOKEN do not fire push events, so
#   the auto-merge path would otherwise never reach deploy.
on:
  push:
    branches: [main, test]
  workflow_call:
    inputs:
      ref:
        description: "Branch to deploy (main or test)"
        required: true
        type: string

# `inputs` is only defined for workflow_call/workflow_dispatch triggers.
# Gate every reference to it on event_name so push-triggered runs resolve
# cleanly via `github.ref(_name)` and never touch the inputs context.
concurrency:
  group: deploy-${{ github.event_name == 'workflow_call' && inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_call' && inputs.ref || github.ref_name) == 'main' && 'production' || 'test' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.ref || github.ref }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          set -eu
          url="${PROD_URL%/}/api/webhook"
          allowed='["message","edited_message","my_chat_member"]'
          if [ -n "${WEBHOOK_SECRET:-}" ]; then
            resp=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=${url}" \
              --data-urlencode "secret_token=${WEBHOOK_SECRET}" \
              --data-urlencode "allowed_updates=${allowed}")
          else
            resp=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=${url}" \
              --data-urlencode "allowed_updates=${allowed}")
          fi
          case "$resp" in
            *'"ok":true'*) echo "webhook ok -> ${url}" ;;
            *) echo "webhook FAILED: $resp" ; exit 1 ;;
          esac

      - name: Warm /api/health
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          curl -sS -o /dev/null -w 'health %{http_code}\n' "${PROD_URL%/}/api/health" || true
