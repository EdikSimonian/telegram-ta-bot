name: Deploy

on:
  push:
    branches: [main, test]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    # Skip when the head commit was already tested by pr-review.yml —
    # auto-merge stamps "[pr-tested]" into the squash commit body so
    # we don't run the same suite twice.
    if: ${{ !contains(github.event.head_commit.message, '[pr-tested]') }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  deploy:
    needs: test
    # Run after `test` succeeds OR when it was skipped (pre-tested by
    # pr-review.yml). Still blocks on actual test failure.
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'test' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          set -eu
          url="${PROD_URL%/}/api/webhook"
          allowed='["message","edited_message","my_chat_member"]'
          if [ -n "${WEBHOOK_SECRET:-}" ]; then
            resp=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=${url}" \
              --data-urlencode "secret_token=${WEBHOOK_SECRET}" \
              --data-urlencode "allowed_updates=${allowed}")
          else
            resp=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=${url}" \
              --data-urlencode "allowed_updates=${allowed}")
          fi
          case "$resp" in
            *'"ok":true'*) echo "webhook ok -> ${url}" ;;
            *) echo "webhook FAILED: $resp" ; exit 1 ;;
          esac

      - name: Warm /api/health
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          curl -sS -o /dev/null -w 'health %{http_code}\n' "${PROD_URL%/}/api/health" || true

  # DM the instructor via the bot's own Telegram token when the
  # deployment was skipped (tests failed) or the deploy job errored.
  # Silent on success. Requires repo secret TELEGRAM_ADMIN_CHAT_ID.
  notify:
    needs: [test, deploy]
    if: >-
      ${{ always() &&
          (needs.test.result   == 'failure' ||
           needs.deploy.result == 'failure' ||
           needs.deploy.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: DM admin on failure/skip
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID:      ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TEST_RESULT:        ${{ needs.test.result }}
          DEPLOY_RESULT:      ${{ needs.deploy.result }}
          REF:                ${{ github.ref_name }}
          SHA:                ${{ github.sha }}
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu
          if [ -z "${ADMIN_CHAT_ID:-}" ]; then
            echo "TELEGRAM_ADMIN_CHAT_ID not set; skipping DM." >&2
            exit 0
          fi

          # Classify the failure mode for a concise headline.
          if   [ "$DEPLOY_RESULT" = "skipped" ]; then
            status="⏭️ Deploy SKIPPED"
            reason="Tests failed — deploy was not attempted."
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            status="❌ Deploy FAILED"
            reason="The deploy step errored (check the run log)."
          elif [ "$TEST_RESULT" = "failure" ]; then
            status="❌ Tests FAILED"
            reason="pytest did not pass."
          else
            status="ℹ️ Deploy problem"
            reason="test=$TEST_RESULT, deploy=$DEPLOY_RESULT"
          fi

          short_sha="${SHA:0:7}"
          message="<b>${status}</b> on <code>${REF}</code>

          ${reason}

          Commit: <code>${short_sha}</code>
          Run: ${RUN_URL}"

          resp=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${ADMIN_CHAT_ID}" \
            --data-urlencode "text=${message}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true")
          case "$resp" in
            *'"ok":true'*) echo "DM sent." ;;
            *) echo "DM failed: $resp" ; exit 1 ;;
          esac
